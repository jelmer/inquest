[package]
name = "inquest"
version = "0.1.0"
edition = "2021"
authors = ["Jelmer Vernooĳ <jelmer@jelmer.uk>"]
license = "Apache-2.0 OR BSD-3-Clause"
description = "A repository of test results"
repository = "https://github.com/testing-cabal/testrepository"
keywords = ["subunit", "testrunner", "unittest", "testing"]
categories = ["development-tools::testing"]

[[bin]]
name = "inq"
path = "src/main.rs"

[lib]
name = "inquest"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_ini = "0.2"
gdbm = "0.2"
rusqlite = { version = "0.32", features = ["bundled"] }
clap = { version = "4.5", features = ["derive", "env"] }
chrono = "0.4"
subunit = "0.3.0"
tempfile = "3.13"
regex = "1.0"
memmap2 = "0.9"
num_cpus = "1.16"
indicatif = "0.17"
console = "0.15"

[dev-dependencies]
tempfile = "3.13"
