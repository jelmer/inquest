name: inquest
description: Run tests with inquest and publish CI-friendly output (log groups, inline annotations, job summary)
author: Jelmer Vernooĳ
branding:
  icon: search
  color: blue

inputs:
  version:
    description: |
      Version of inquest to install (e.g. "0.1.5"). Defaults to "latest",
      which resolves to the latest GitHub release of jelmer/inquest.
    required: false
    default: latest

  args:
    description: |
      Additional arguments passed to `inq ci`. Examples: "--retry=2",
      "--order=spread", "-j 4". The `--format` flag is left to autodetection
      unless you set it here.
    required: false
    default: ""

  fail-fast:
    description: |
      Stop the run after the first test failure (passes `--fail-fast` to
      `inq ci`). With smart ordering the historically-failing tests run
      first, so a known regression fails the job quickly. Set to "true" to
      enable.
    required: false
    default: "false"

  working-directory:
    description: |
      Directory to run `inq ci` in. Defaults to the workspace root. The
      `.inquest` cache (if enabled) lives under this directory.
    required: false
    default: ""

  cache:
    description: |
      Restore and save the `.inquest` directory across runs so the
      history-aware features (frequent-failing-first ordering, slow-test
      warnings, auto timeouts, ETA) have something to work with. Set to
      "false" to skip.
    required: false
    default: "true"

  cache-key-prefix:
    description: |
      Prefix for the `.inquest` cache key. Override if you run inquest in
      multiple distinct jobs in the same repo and want them to keep
      separate histories.
    required: false
    default: inquest

  install-cargo-fallback:
    description: |
      When no prebuilt binary is available for the requested version, fall
      back to `cargo install inquest@<version>`. Set to "false" to fail
      hard instead.
    required: false
    default: "true"

outputs:
  exit-code:
    description: Exit code from `inq ci` (0 on success, non-zero on test failures).
    value: ${{ steps.run.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Resolve inquest version
      id: resolve
      shell: bash
      env:
        REQUESTED_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ "$REQUESTED_VERSION" = "latest" ]; then
          # Take the latest non-prerelease tag from this action's source repo.
          tag=$(gh release view --repo jelmer/inquest --json tagName --jq .tagName)
        else
          # Normalise "0.1.5" and "v0.1.5" both to "v0.1.5".
          case "$REQUESTED_VERSION" in
            v*) tag="$REQUESTED_VERSION" ;;
            *)  tag="v$REQUESTED_VERSION" ;;
          esac
        fi
        version="${tag#v}"
        echo "tag=$tag"         >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Cache inquest binary
      id: bin-cache
      uses: actions/cache@v4
      with:
        # `inq.exe` on Windows, `inq` everywhere else. actions/cache happily
        # caches a non-existent path on miss and ignores missing entries on
        # hit, so listing both is safe.
        path: |
          ~/.cargo/bin/inq
          ~/.cargo/bin/inq.exe
        key: inquest-bin-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve.outputs.version }}

    - name: Download prebuilt inquest
      id: prebuilt
      if: steps.bin-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        TAG: ${{ steps.resolve.outputs.tag }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # Release assets are named by target triple, e.g.
        # inq-x86_64-unknown-linux-gnu.tar.gz (or .zip on Windows).
        # Match the current runner.
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   target=x86_64-unknown-linux-gnu;   ext=tar.gz; bin=inq ;;
          Linux-ARM64) target=aarch64-unknown-linux-gnu;  ext=tar.gz; bin=inq ;;
          macOS-X64)   target=x86_64-apple-darwin;        ext=tar.gz; bin=inq ;;
          macOS-ARM64) target=aarch64-apple-darwin;       ext=tar.gz; bin=inq ;;
          Windows-X64) target=x86_64-pc-windows-msvc;     ext=zip;    bin=inq.exe ;;
          *)
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No prebuilt target for ${{ runner.os }}-${{ runner.arch }}; will try cargo install"
            exit 0
            ;;
        esac
        asset="inq-${target}.${ext}"
        tmpdir=$(mktemp -d)
        if gh release download "$TAG" --repo jelmer/inquest --pattern "$asset" --dir "$tmpdir" 2>/dev/null; then
          if [ "$ext" = "zip" ]; then
            unzip -q "$tmpdir/$asset" -d "$tmpdir"
          else
            tar -xzf "$tmpdir/$asset" -C "$tmpdir"
          fi
          mkdir -p "$HOME/.cargo/bin"
          # Release tarball lays the binary out at inq-<target>/<bin>.
          mv "$tmpdir/inq-${target}/$bin" "$HOME/.cargo/bin/$bin"
          chmod +x "$HOME/.cargo/bin/$bin"
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "found=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No prebuilt binary for $TAG/$target; falling back to cargo install"
        fi

    - name: Install via cargo
      if: steps.bin-cache.outputs.cache-hit != 'true' && steps.prebuilt.outputs.found != 'true'
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
        FALLBACK_ALLOWED: ${{ inputs.install-cargo-fallback }}
      run: |
        set -euo pipefail
        if [ "$FALLBACK_ALLOWED" != "true" ]; then
          echo "::error::No prebuilt binary for inquest $VERSION on this runner, and install-cargo-fallback=false"
          exit 1
        fi
        if ! command -v cargo >/dev/null 2>&1; then
          echo "::error::cargo is not available; either pre-install Rust or use a runner image that has it"
          exit 1
        fi
        # Build without default features so the fallback stays hermetic:
        # the gdbm feature links against libgdbm (an extra apt/brew step
        # away on standard runners), and testr/junit pull in adapters that
        # are not required for the formats `inq ci` consumes in CI.
        # `bundled-sqlite` embeds SQLite statically so we don't have to
        # provision libsqlite3 (Ubuntu/macOS) or sqlite3.dll (Windows) on
        # the runner before building.
        cargo install --locked --version "$VERSION" \
          --no-default-features \
          --features bundled-sqlite \
          inquest

    - name: Add cargo bin to PATH
      shell: bash
      run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Resolve working directory
      id: wd
      shell: bash
      env:
        REQUESTED: ${{ inputs.working-directory }}
      run: |
        if [ -z "$REQUESTED" ]; then
          echo "path=${{ github.workspace }}" >> "$GITHUB_OUTPUT"
        else
          echo "path=$REQUESTED" >> "$GITHUB_OUTPUT"
        fi

    - name: Restore inquest history cache
      if: inputs.cache == 'true'
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.wd.outputs.path }}/.inquest
        # Always restore the latest cache for this project (any prior run),
        # so slow-test timings and frequent-failing-first ordering carry
        # across every run regardless of commit. The save step below uses a
        # run-unique key so the updated history is always written back.
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-

    - name: Discard restored cache if unusable
      # A cache can be restored in a partial state (interrupted save on a
      # previous run, format skew across inquest versions, ...). Ask inq
      # whether the restored `.inquest/` is openable and drop it if not,
      # so `inq ci` starts from a clean slate instead of failing before
      # the first test runs.
      if: inputs.cache == 'true'
      shell: bash
      working-directory: ${{ steps.wd.outputs.path }}
      run: |
        # Only relevant when `.inquest/` was actually restored. On older
        # inquest builds without `repo-check`, skip the check rather than
        # risk discarding a healthy cache on a false positive.
        if [ ! -d .inquest ]; then
          exit 0
        fi
        if ! inq --help 2>&1 | grep -q '^  repo-check '; then
          exit 0
        fi
        if ! inq repo-check; then
          echo "::notice::Dropping unusable restored .inquest cache"
          rm -rf .inquest
        fi

    - name: Run inq ci
      id: run
      shell: bash
      working-directory: ${{ steps.wd.outputs.path }}
      env:
        INQ_ARGS: ${{ inputs.args }}
        FAIL_FAST: ${{ inputs.fail-fast }}
      run: |
        set +e
        fail_fast_arg=""
        if [ "$FAIL_FAST" = "true" ]; then
          fail_fast_arg="--fail-fast"
        fi
        # shellcheck disable=SC2086
        inq ci $fail_fast_arg $INQ_ARGS
        code=$?
        echo "exit-code=$code" >> "$GITHUB_OUTPUT"
        exit $code

    - name: Verify cache is saveable
      id: cache-check
      # If `inq ci` failed before writing a usable `.inquest/`, don't save
      # the partial directory: it would poison the cache for future runs.
      if: inputs.cache == 'true' && always()
      shell: bash
      working-directory: ${{ steps.wd.outputs.path }}
      run: |
        # On older inquest builds without `repo-check`, let the save
        # happen; the pre-run check on the next run will drop the cache
        # if it turns out to be broken.
        if ! inq --help 2>&1 | grep -q '^  repo-check '; then
          echo "saveable=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if inq repo-check; then
          echo "saveable=true" >> "$GITHUB_OUTPUT"
        else
          echo "saveable=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Skipping inquest cache save: repository is not usable"
        fi

    - name: Save inquest history cache
      # Runs even on test failure so the updated history (timings, failure
      # counts) is captured. A fresh key per run guarantees the save happens;
      # the restore step above picks up the most recent of these on the next
      # run via its prefix.
      if: inputs.cache == 'true' && always() && steps.cache-check.outputs.saveable == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.wd.outputs.path }}/.inquest
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
