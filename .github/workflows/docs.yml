name: docs
on: [push, pull_request]

jobs:
  test:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
      - name: Install mdbook
        run: cargo install mdbook --version "^0.4" --locked
      - name: Run tests
        run: mdbook test doc
