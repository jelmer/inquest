name: Test

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgdbm-dev libsqlite3-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gdbm
          echo "LIBRARY_PATH=$(brew --prefix gdbm)/lib" >> $GITHUB_ENV
          echo "CPATH=$(brew --prefix gdbm)/include" >> $GITHUB_ENV

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install sqlite3:x64-windows
        shell: bash

      - name: Set vcpkg environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=1" >> $GITHUB_ENV
        shell: bash

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Explicitly ensure rustfmt is installed - workaround for macOS where
      # the component sometimes isn't properly installed by the toolchain action
      - name: Ensure rustfmt is installed
        run: rustup component add rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (with gdbm)
        if: matrix.os != 'windows-latest'
        run: cargo clippy -- -D warnings

      - name: Clippy (without gdbm)
        if: matrix.os == 'windows-latest'
        run: cargo clippy --no-default-features -- -D warnings

      - name: Tests (with gdbm)
        if: matrix.os != 'windows-latest'
        run: cargo test

      - name: Tests (without gdbm)
        if: matrix.os == 'windows-latest'
        run: cargo test --no-default-features

  success:
    needs: build
    runs-on: ubuntu-latest
    name: test successful
    steps:
      - name: Success
        run: echo Test successful
